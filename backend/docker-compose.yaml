services:
  api:
    build: .
    image: wathik-api:latest
    container_name: wathik-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: 3000
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL}
      OCR_API_KEY: ${OCR_API_KEY}
      GROQ_API_KEY: ${OPENROUTER_API_KEY}
      GROQ_MODEL: ${OPENROUTER_MODEL:-z-ai/glm-4.5-air:free}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_TIMEOUT_MS: ${OPENROUTER_TIMEOUT_MS:-60000}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/openapi.json"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
